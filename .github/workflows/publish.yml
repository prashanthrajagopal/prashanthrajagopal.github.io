name: Publish Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Zensical
        run: pip install zensical pyyaml

      - name: Sync latest blog on homepage
        run: python scripts/sync_latest_blog.py

      - name: Build site
        run: zensical build --clean

      - name: Sitemap and robots.txt
        run: python scripts/generate_sitemap.py
        env:
          SITE_URL: https://prashanthr.net
          SITE_DIR: site

      - name: GitHub Pages extras
        run: |
          touch site/.nojekyll
          echo prashanthr.net > site/CNAME

      - name: IndexNow key file
        if: env.INDEXNOW_KEY != ''
        run: echo "$INDEXNOW_KEY" > "site/${INDEXNOW_KEY}.txt"
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ping search engines
        run: python scripts/ping_search_engines.py
        env:
          SITE_URL: https://prashanthr.net
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
