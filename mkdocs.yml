site_name: Prashanth Rajagopal — prashanthr.net
site_description: Prashanth Rajagopal's blog and wiki on distributed systems, agent infrastructure, and Astra — an autonomous agent OS.
site_url: https://prashanthr.net
docs_dir: docs
site_dir: site
copyright: Built by Prashanth Rajagopal · Made with <a href="https://zensical.org/">Zensical</a>

theme:
  name: material
  font:
    text: DM Sans
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - meta
  - blog:
      blog_dir: blog
      post_url_format: "{date}/{slug}"
      post_date_format: long
      archive: true
      categories: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tasklist
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Wiki:
    - Overview: wiki/index.md
    - Ruby & Rails:
      - wiki/rails/index.md
      - Philosophy: wiki/rails/philosophy.md
      - Active Record: wiki/rails/active-record.md
      - Hotwire: wiki/rails/hotwire.md
    - Systems:
      - wiki/systems/index.md
      - Caching: wiki/systems/caching.md
      - Streaming: wiki/systems/streaming.md
      - Consistency: wiki/systems/consistency.md
      - Observability: wiki/systems/observability.md
    - Tools:
      - wiki/tools/index.md
      - Editor: wiki/tools/editor.md
      - Zensical: wiki/tools/zensical.md
      - Git: wiki/tools/git.md
      - CLI debugging: wiki/tools/cli-debugging.md
    - Site contributing: wiki/getting-started.md
  - Astra:
    - astra/index.md
    - Getting Started: wiki/astra/getting-started/index.md
    - Glossary: wiki/astra/glossary.md
    - Security: wiki/astra/security.md
    - Architecture:
      - wiki/astra/architecture/index.md
      - Overview: wiki/astra/architecture/overview.md
      - Kernel: wiki/astra/architecture/kernel.md
      - Actor Framework: wiki/astra/architecture/actor-framework.md
      - Task Graph: wiki/astra/architecture/task-graph.md
      - Scheduler: wiki/astra/architecture/scheduler.md
      - Services: wiki/astra/architecture/services.md
      - Memory: wiki/astra/architecture/memory.md
      - LLM Routing: wiki/astra/architecture/llm-routing.md
      - Multi-Tenancy: wiki/astra/architecture/multi-tenancy.md
    - Reference:
      - wiki/astra/reference/index.md
      - gRPC Contracts: wiki/astra/reference/grpc-contracts.md
      - Database Schema: wiki/astra/reference/database-schema.md
      - Redis Keys: wiki/astra/reference/redis-keys.md
      - Message Types: wiki/astra/reference/message-types.md
      - API Endpoints: wiki/astra/reference/api-endpoints.md
      - Metrics: wiki/astra/reference/metrics.md
      - SLAs: wiki/astra/reference/slas.md
    - Operations:
      - wiki/astra/operations/index.md
      - Runbook — Worker Lost: wiki/astra/operations/runbook-worker-lost.md
      - Runbook — High Error Rate: wiki/astra/operations/runbook-high-error-rate.md
      - Runbook — Postgres Outage: wiki/astra/operations/runbook-postgres-outage.md
      - Runbook — Redis Failure: wiki/astra/operations/runbook-redis-failure.md
      - Runbook — Cost Spike: wiki/astra/operations/runbook-cost-spike.md
    - Deployment:
      - wiki/astra/deployment/index.md
      - Kubernetes / Helm: wiki/astra/deployment/kubernetes.md
      - Local: wiki/astra/deployment/local.md
      - macOS: wiki/astra/deployment/macos.md
      - GCP: wiki/astra/deployment/gcp.md

extra_css:
  - stylesheets/prashantr-theme.css

extra_javascript:
  - javascripts/header-brand.js
  - javascripts/blog-filter.js
  - javascripts/structured-data.js

extra:
  generator: false
  analytics:
    provider: google
    property: G-FBH4Q1PWKS
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/prashanthrajagopal
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/prashanthrajagopal
