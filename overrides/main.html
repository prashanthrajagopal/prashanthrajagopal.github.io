{% extends "base.html" %}

{% block extrahead %}
  <!-- Open Graph -->
  <meta property="og:type" content="{% if page and page.meta and page.meta.date %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title | default(config.site_name) }}">
  <meta property="og:description" content="{{ page.meta.description | default(config.site_description) }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta property="og:site_name" content="prashanthr.net">
  <meta property="og:locale" content="en_US">
  {% if page and page.meta and page.meta.date %}
  <meta property="article:author" content="Prashanth Rajagopal">
  <meta property="article:published_time" content="{{ page.meta.date }}">
  {% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@prashanthrajagopal">
  <meta name="twitter:title" content="{{ page.title | default(config.site_name) }}">
  <meta name="twitter:description" content="{{ page.meta.description | default(config.site_description) }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ page.canonical_url }}">

  <!-- Author -->
  <meta name="author" content="Prashanth Rajagopal">
{% endblock %}

{% block fonts %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
  <style>:root{--md-text-font:"DM Sans";--md-code-font:"JetBrains Mono"}</style>
{% endblock %}

{% block footer %}
  {{ super() }}
  <div class="pr-footer-links">
    <a href="/wiki/">Wiki</a>
    <span class="pr-footer-sep">·</span>
    <a href="/wiki/rails/">Rails</a>
    <span class="pr-footer-sep">·</span>
    <a href="/wiki/systems/">Systems</a>
    <span class="pr-footer-sep">·</span>
    <a href="/wiki/tools/">Tools</a>
    <span class="pr-footer-sep">·</span>
    <a href="/wiki/astra/">Astra</a>
    <span class="pr-footer-sep">·</span>
    <a href="/blog/">Blog</a>
  </div>
{% endblock %}
